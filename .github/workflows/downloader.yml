name: Dynamic Video Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste your YouTube or Reddit Link here'
        required: true
        type: string
      media_format:
        description: 'Choose target format'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mp3

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg (For video/audio stitching)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Run Downloader Engine
        run: |
          if [ "${{ github.event.inputs.media_format }}" = "mp3" ]; then
            yt-dlp -f 'bestaudio/best' --extract-audio --audio-format mp3 --audio-quality 192K -o "downloaded-media.%(ext)s" "${{ github.event.inputs.video_url }}"
          else
            yt-dlp -f 'bestvideo+bestaudio/best' --merge-output-format mp4 -o "downloaded-media.%(ext)s" "${{ github.event.inputs.video_url }}"
          fi

      - name: Upload Finished File to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Media-Output
          path: downloaded-media.*
          retention-days: 1
